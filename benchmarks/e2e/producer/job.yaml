# Benchmark v2 producer Job — pre-loads the topic before a measured drain
# (plan §5 step 2, decision 6). Runs to completion, records rows_expected from
# committed topic END OFFSETS, then exits. The orchestrator (task 31) waits for
# this Job to succeed before deploying any Connect arm.
#
# CRITICAL: backoffLimit 0 + restartPolicy Never. A retried, half-complete
# pre-load would corrupt rows_expected (idempotence protects against duplicate
# *records*, but a second Job invocation would re-produce the whole dataset on
# top of the first, doubling end offsets). The orchestrator handles retry by
# recreating the topic and creating a fresh Job — never by letting K8s restart
# this one.
#
# The image is built from benchmarks/e2e/producer/Dockerfile (build context
# benchmarks/e2e/). Set the image ref via `kubectl set image` or an overlay;
# the placeholder below is replaced by CI.
apiVersion: batch/v1
kind: Job
metadata:
  name: hits-producer
  namespace: kafka-bench
  labels:
    app: hits-producer
    app.kubernetes.io/part-of: kafka-connect-benchmark-v2
spec:
  # A half-complete pre-load must never be silently retried — see header.
  backoffLimit: 0
  # Give a full-dataset (~100M row) run generous headroom; the orchestrator can
  # override. 6h.
  activeDeadlineSeconds: 21600
  # Clean up the finished Job object automatically 1h after completion.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: hits-producer
        app.kubernetes.io/part-of: kafka-connect-benchmark-v2
    spec:
      restartPolicy: Never
      # Keep the producer on the bench nodegroup (2026-07-08 rebuild): the
      # dedicated connect-ng m6i.xlarge runs ONLY the Connect worker, so the
      # producer must land on bench-ng (role=bench). The podAntiAffinity below
      # still spreads it off the broker pod within bench-ng.
      nodeSelector:
        role: bench
      # Keep the producer off the broker node when the scheduler can manage it.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    strimzi.io/cluster: bench
                topologyKey: kubernetes.io/hostname
      containers:
        - name: producer
          # Replaced by CI with the built image ref (ECR).
          image: PRODUCER_IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          env:
            # Strimzi bootstrap for cluster `bench`, plaintext 9092.
            - name: BOOTSTRAP
              value: "bench-kafka-bootstrap.kafka-bench.svc:9092"
            # Confluent Schema Registry in-cluster service (schema-registry.yaml).
            - name: REGISTRY_URL
              value: "http://schema-registry.kafka-bench.svc:8081"
            - name: TOPIC
              value: "hits"
            - name: PARTITIONS
              value: "3"
            # The orchestrator creates the fresh topic per run (decision 6), so
            # the Job does NOT create it (CREATE_TOPIC defaults to false). Set
            # to "true" only for standalone/local runs.
            - name: CREATE_TOPIC
              value: "false"
            # PARQUET_SOURCE: staging location is a PENDING decision (overseer
            # directive 3). Default here is the us-east-2 staging placeholder;
            # CI/orchestrator overrides it with the resolved location. See
            # README "Parquet staging (TBD)".
            - name: PARQUET_SOURCE
              value: "s3://TBD-us-east-2-staging/clickbench/hits/"
            # AWS region for S3 reads (co-located with the Cloud target).
            - name: AWS_REGION
              value: "us-east-2"
            # Parquet read batch (memory bound, not the Kafka batch).
            - name: PARQUET_BATCH_ROWS
              value: "65536"
          resources:
            # Sized for an m6i.large node (2 vCPU / 8 GiB). The producer is
            # I/O + serialize bound; it streams parquet in bounded batches so
            # memory stays flat regardless of dataset size.
            requests:
              cpu: "1"
              # 4Gi/6Gi: the 1Gi/3Gi sizing OOMKilled at ~2m44s into a 10M-row
              # pre-load (2026-07-07 live run) — the bounded-batch streaming
              # assumption does not hold (suspect pyarrow fragment prefetch and/or
              # rdkafka queue growth); needs a proper streaming fix, tracked.
              memory: 4Gi
            limits:
              cpu: "2"
              # 7Gi (was 6Gi): 6Gi OOMKilled nondeterministically at ~2.5M rows
              # (2026-07-12 pair-3 attempt) while an identical run passed at 6Gi
              # (pair-2) — the peak (rdkafka queue near its 1GiB cap + a pyarrow
              # row-group spike) sits right at the old limit. Limit-only bump:
              # scheduling (requests) unchanged; m6i.large allocatable ~7.1Gi.
              # Durable fix (queued): halve queue.buffering.max in producer.py.
              memory: 7Gi
