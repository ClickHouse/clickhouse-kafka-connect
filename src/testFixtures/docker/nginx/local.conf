upstream clickhouse_cluster {
    server ch0:8123 max_fails=0 fail_timeout=300s;
    server ch1:8123 max_fails=0 fail_timeout=300s;
    server ch2:8123 max_fails=0 fail_timeout=300s;
    keepalive 32;
}

server {
    listen 8123;
    client_max_body_size 100M;
    location / {
        proxy_pass http://clickhouse_cluster;
        proxy_connect_timeout 10s;
        proxy_send_timeout   300s;
        proxy_read_timeout   300s;
    }
}
