syntax = "proto3";

package com.clickhouse.kafka.connect.proto.test;

message ArrayWithArraysAndTuples {
  int32 id = 1;
  repeated L1 items = 2;

  message L3 {
    int32 value = 1;
  }

  message L2 {
    repeated L3 l3_array = 1;
    string name = 2;
  }

  message L1 {
    int64 l1_long = 1;
    L2 l2_tuple = 2;
    repeated string tags = 3;
  }
}
