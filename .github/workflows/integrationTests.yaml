name: Integration Tests

on:
  schedule:
    - cron: "55 15 * * *"
  workflow_dispatch:

# note: LTS releases and latest stable builds can be found here: https://github.com/ClickHouse/ClickHouse/pulls?q=is%3Aopen+is%3Apr+label%3Arelease
jobs:
  build-and-run-cloud:
    runs-on: ubuntu-latest
    name: Kafka Connect integration tests against ClickHouse cloud
    steps:
      - name: Mask secure properties
        run: |
          echo "::add-mask::${{ secrets.CLICKHOUSE_PASSWORD }}"
          echo "::add-mask::${{ secrets.CLICKHOUSE_CLOUD_SECRET }}"
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
#      NOTE: since cloud integration tests restart the cloud service, run V1 and V2 tests sequentially
      - name: Setup and execute Gradle 'integrationTest' task - Client version V1
        uses: gradle/gradle-build-action@v2
        env:
          CLICKHOUSE_VERSION: cloud
          CLIENT_VERSION: V1
        with:
          arguments: integrationTest
            --tests "com.clickhouse.kafka.connect.sink.ClickHouseCloudTest"
            --tests "com.clickhouse.kafka.connect.sink.ExactlyOnceTest"
            -Dclickhouse.host=${{vars.CLICKHOUSE_HOST}}
            -Dclickhouse.port=${{vars.CLICKHOUSE_PORT}}
            -Dclickhouse.password=${{secrets.CLICKHOUSE_PASSWORD}}
            -Dclickhouse.cloud.organization=${{vars.CLICKHOUSE_CLOUD_ORGANIZATION}}
            -Dclickhouse.cloud.apiKey=${{vars.CLICKHOUSE_CLOUD_API_KEY}}
            -Dclickhouse.cloud.secret=${{secrets.CLICKHOUSE_CLOUD_SECRET}}
            -Dclickhouse.cloud.serviceId=${{vars.CLICKHOUSE_CLOUD_SERVICE_ID}}
            -Dclickhouse.cloud.host=${{vars.CLICKHOUSE_CLOUD_API_HOST}}
      - name: Setup and execute Gradle 'integrationTest' task - Client version V2
        uses: gradle/gradle-build-action@v2
        env:
          CLICKHOUSE_VERSION: cloud
          CLIENT_VERSION: V2
        with:
          arguments: integrationTest
            --tests "com.clickhouse.kafka.connect.sink.ClickHouseCloudTest"
            --tests "com.clickhouse.kafka.connect.sink.ExactlyOnceTest"
            -Dclickhouse.host=${{vars.CLICKHOUSE_HOST}}
            -Dclickhouse.port=${{vars.CLICKHOUSE_PORT}}
            -Dclickhouse.password=${{secrets.CLICKHOUSE_PASSWORD}}
            -Dclickhouse.cloud.organization=${{vars.CLICKHOUSE_CLOUD_ORGANIZATION}}
            -Dclickhouse.cloud.apiKey=${{vars.CLICKHOUSE_CLOUD_API_KEY}}
            -Dclickhouse.cloud.secret=${{secrets.CLICKHOUSE_CLOUD_SECRET}}
            -Dclickhouse.cloud.serviceId=${{vars.CLICKHOUSE_CLOUD_SERVICE_ID}}
            -Dclickhouse.cloud.host=${{vars.CLICKHOUSE_CLOUD_API_HOST}}
  build-and-run-standalone:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: [ "V1", "V2" ]
        clickhouse: [ "25.3", "25.8", "25.10", "25.11", "25.12", "latest", "head" ]
    name: Kafka Connect integration tests against standalone ClickHouse ${{ matrix.clickhouse }} Client version ${{ matrix.client }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup and execute Gradle 'integrationTest' task
        uses: gradle/gradle-build-action@v2
        env:
          CLICKHOUSE_VERSION: ${{ matrix.clickhouse }}
          CLIENT_VERSION: ${{ matrix.client }}
        with:
          arguments: integrationTest
            --tests "com.clickhouse.kafka.connect.sink.ClickHouseSinkConnectorIntegrationTest"
  build-and-run-cluster:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        client: [ "V1", "V2" ]
        clickhouse: [ "25.3", "25.8", "25.10", "25.11", "25.12", "latest", "head" ]
        cluster_name: [ "three_shards_one_replica_each", "one_shard_three_replicas" ]
    name: Kafka Connect integration tests against cluster ${{ matrix.cluster_name }} ClickHouse ${{ matrix.clickhouse }} Client version ${{ matrix.client }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup and execute Gradle 'integrationTest' task
        uses: gradle/gradle-build-action@v2
        env:
          CLICKHOUSE_VERSION: ${{ matrix.clickhouse }}
          CLIENT_VERSION: ${{ matrix.client }}
          CLICKHOUSE_CLUSTER_NAME: ${{ matrix.cluster_name }}
        with:
          arguments: integrationTest
            --tests "com.clickhouse.kafka.connect.sink.ClickHouseSinkConnectorIntegrationTest"
            --tests "com.clickhouse.kafka.connect.sink.ExactlyOnceTest"
