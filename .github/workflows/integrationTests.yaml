name: Integration Tests

on:
  schedule:
    - cron: "55 15 * * *"
  workflow_dispatch:

jobs:
  build-and-run-cloud:
    runs-on: ubuntu-24.04-arm
    name: Kafka Connect integration tests against ClickHouse cloud
    steps:
      - name: Mask secure properties
        run: |
          echo "::add-mask::${{ secrets.CLICKHOUSE_PASSWORD }}"
          echo "::add-mask::${{ secrets.CLICKHOUSE_CLOUD_SECRET }}"
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup and execute Gradle 'integrationTest' task
        uses: gradle/gradle-build-action@v2
        with:
          arguments: integrationTest \
            --tests "com.clickhouse.kafka.connect.sink.ClickHouseCloudTest" \
            --tests "com.clickhouse.kafka.connect.sink.ExactlyOnceTest" \
            -Dclickhouse.host=${{vars.CLICKHOUSE_HOST}} \
            -Dclickhouse.port=${{vars.CLICKHOUSE_PORT}} \
            -Dclickhouse.password=${{secrets.CLICKHOUSE_PASSWORD}} \
            -Dclickhouse.cloud.organization=${{vars.CLICKHOUSE_CLOUD_ORGANIZATION}} \
            -Dclickhouse.cloud.id=${{vars.CLICKHOUSE_CLOUD_ID}} \
            -Dclickhouse.cloud.secret=${{secrets.CLICKHOUSE_CLOUD_SECRET}} \
            -Dclickhouse.cloud.serviceId=${{vars.CLICKHOUSE_CLOUD_SERVICE_ID}} \
            -Dclickhouse.cloud.host=${{vars.CLICKHOUSE_CLOUD_API_HOST}}
  build-and-run-docker:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        clickhouse: [ "25.3", "25.8", "25.10", "25.11", "25.12", "latest", "head" ]
    name: Kafka Connect integration tests against ClickHouse ${{ matrix.clickhouse }}
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'
      - name: Setup and execute Gradle 'integrationTest' task
        uses: gradle/gradle-build-action@v2
        env:
          CLICKHOUSE_VERSION: ${{ matrix.clickhouse }}
        with:
          arguments: integrationTest \
            --tests "com.clickhouse.kafka.connect.sink.ClickHouseSinkConnectorIntegrationTest"
