name: ClickHouse Kafka Connect Tests CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'

jobs:
  standalone-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        client: ["V1", "V2"]
        clickhouse: ["25.3", "25.8", "25.10", "25.11", "25.12", "latest"]
    name: ClickHouse Standalone ${{ matrix.clickhouse }} Client version ${{ matrix.client }} tests
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3
      - name: Run Tests
        env:
          CLICKHOUSE_VERSION: ${{ matrix.clickhouse }}
          CLIENT_VERSION: ${{ matrix.client }}
        run: ./gradlew test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: result standalone_${{ matrix.client }}_${{ matrix.clickhouse }}_runid_${{ github.run_id }}
          path: |
            **/build/reports/tests
          retention-days: 5
  cloud-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        client: [ "V1", "V2" ]
    name: ClickHouse Cloud Client version ${{ matrix.client }} tests
    steps:
      - name: Check for Cloud Credentials
        id: check-cloud-credentials
        run: |
          if [[ (-z "${{ secrets.INTEGRATIONS_TEAM_TESTS_CLOUD_HOST_SMT }}" || -z "${{ secrets.INTEGRATIONS_TEAM_TESTS_CLOUD_PASSWORD_SMT }}") ]]; then
            echo "SKIP_STEP=true" >> $GITHUB_ENV
          else
            echo "SKIP_STEP=false" >> $GITHUB_ENV
          fi
        shell: bash

      - uses: actions/checkout@v3
        if: env.SKIP_STEP != 'true'
      - name: Set up JDK 17
        if: env.SKIP_STEP != 'true'
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@017a9effdb900e5b5b2fddfb590a105619dca3c3
      - name: Run Tests
        if: env.SKIP_STEP != 'true'
        env:
          CLICKHOUSE_VERSION: cloud
          CLICKHOUSE_CLOUD_HOST: ${{ secrets.INTEGRATIONS_TEAM_TESTS_CLOUD_HOST_SMT }}
          CLICKHOUSE_CLOUD_PASSWORD: ${{ secrets.INTEGRATIONS_TEAM_TESTS_CLOUD_PASSWORD_SMT }}
          CLIENT_VERSION: ${{ matrix.client }}
        run: ./gradlew test
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: result cloud_${{ matrix.client }}_runid_${{ github.run_id }}
          path: |
            **/build/reports/tests
          retention-days: 5
